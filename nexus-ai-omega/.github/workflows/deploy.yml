name: Nexus AI Omega — CI/CD v3.3

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Typecheck ──────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-fund
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm audit --audit-level=high || true

  # ── Test ─────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-fund
      - run: npx prisma generate
      - run: npm test

  # ── Build ─────────────────────────────────────────────────
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-fund
      - run: npx prisma generate
      - run: npm run build

  # ── Docker Build & Push ───────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: [lint-typecheck, test, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=v3.3.0-team

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── Deploy to Railway ─────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/prod' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Railway Token
        id: check_token
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "⚠️  RAILWAY_TOKEN is not set in GitHub Secrets."
            echo "   Go to: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "   Name: RAILWAY_TOKEN"
            echo "   Value: Create a token at https://railway.app/account/tokens"
            echo "   Railway's GitHub App may still auto-deploy if connected."
            echo "has_token=false" >> $GITHUB_OUTPUT
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.check_token.outputs.has_token == 'true'
        run: npm i -g @railway/cli

      - name: Run Prisma Migrations
        if: steps.check_token.outputs.has_token == 'true'
        run: railway run npx prisma migrate deploy
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        if: steps.check_token.outputs.has_token == 'true'
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
